version: '3.8'

services:
  a2a-server:
    build: 
      context: ./src/a2a_server
    container_name: a2a-world-server
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://a2a:a2a_dev_password@postgres:5432/a2a_world
      - ENVIRONMENT=development
      - REDIS_URL=redis://redis:6379
      - PINATA_API_KEY=${PINATA_API_KEY}
      - PINATA_SECRET_KEY=${PINATA_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src/a2a_server:/app

  visual-cortex-api:
    build:
      context: ./src/visual_cortex_api
    container_name: a2a-world-visual-cortex
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=development
      - REDIS_URL=redis://redis:6379
      - PINATA_API_KEY=${PINATA_API_KEY}
      - PINATA_SECRET_KEY=${PINATA_SECRET_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src/visual_cortex_api:/app

  a2a-gateway:
    image: python:3.11-slim
    container_name: a2a-world-gateway
    working_dir: /app
    command: >
      sh -c "pip install fastapi uvicorn requests python-multipart httpx && 
             uvicorn main:app --host 0.0.0.0 --port 8080 --reload"
    ports:
      - "8080:8080"
    environment:
      - A2A_SERVER_URL=http://a2a-server:8000
      - VISUAL_CORTEX_URL=http://visual-cortex-api:8001
      - MAPTILER_API_KEY=${MAPTILER_API_KEY}
    volumes:
      - ./src/a2aworld/a2a_gateway:/app
    depends_on:
      - a2a-server
      - visual-cortex-api

  langchain-npc:
    build:
      context: ./src/langchain_npc
    container_name: a2a-world-langchain-npc
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://a2a:a2a_dev_password@postgres:5432/a2a_world
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:14-alpine
    container_name: a2a-world-postgres
    environment:
      - POSTGRES_USER=a2a
      - POSTGRES_PASSWORD=a2a_dev_password
      - POSTGRES_DB=a2a_world
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a2a -d a2a_world"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: a2a-world-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
